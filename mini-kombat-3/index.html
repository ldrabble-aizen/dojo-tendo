<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>Mini Kombat III</title>
  <link rel="stylesheet" href="styles.css?v=69" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="960" height="540" aria-label="Mini Kombat III"></canvas>
      <div class="topbar">
        <div class="fighter-label left">Pchan</div>
        <div class="topbar-actions">
          <button id="restart" type="button">Reiniciar</button>
          <button id="mode" type="button" aria-pressed="true">CPU</button>
          <button id="tournament" type="button" aria-pressed="false">Torneo</button>
          <button id="online" type="button" aria-pressed="false">Online</button>
          <button id="fighter" type="button">Personajes</button>
          <button id="difficulty" type="button">Normal</button>
          <button id="sound" type="button" aria-pressed="true">Sonido</button>
          <button id="help" type="button">?</button>
        </div>
        <div class="fighter-label right">Akane</div>
      </div>
      <div id="overlay" class="overlay">
        <h1>Mini Kombat III</h1>
        <p id="overlay-copy" class="overlay-copy">
          Mejor de 3 rounds. Akane juega con flechas, K golpe, L patada, O especial y P agarre.
          Elegi los personajes y preparate para pelear.
        </p>
        <div id="fighter-select" class="fighter-select" aria-label="Seleccion de personajes"></div>
        <div class="overlay-actions">
          <button id="tournament-menu" type="button" aria-pressed="false">TORNEO OFF</button>
          <button id="online-menu" type="button" aria-pressed="false">ONLINE</button>
          <button id="start" type="button">LUCHAR</button>
        </div>
      </div>
      <div id="mobile-controls" class="mobile-controls" aria-label="Controles tactiles">
        <div id="mobile-stick" class="mobile-stick" aria-label="Joystick de movimiento" role="application">
          <div class="mobile-stick-base">
            <div id="mobile-stick-knob" class="mobile-stick-knob"></div>
          </div>
          <span>mover / saltar / bloquear</span>
        </div>
        <div class="mobile-actions" aria-label="Ataques">
          <button type="button" data-touch="punch" aria-label="Golpe">K</button>
          <button type="button" data-touch="kick" aria-label="Patada">L</button>
          <button type="button" data-touch="special" aria-label="Especial">O</button>
          <button type="button" data-touch="grab" aria-label="Agarre">P</button>
        </div>
      </div>
    </main>
  <script src="game.js?v=79"></script>
  </body>
</html>
